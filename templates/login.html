<!DOCTYPE html>
<html>
<head>
<title>Login - Lavanya Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0f0f0f;
    --card: #1c1c1c;
    --input: #2a2a2a;
    --border: #333;
    --yellow: #ffcc00;
}

body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

/* Card */
.card {
    background: var(--card);
    padding: 40px 40px;
    border-radius: 14px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 0 25px rgba(255,204,0,0.15);
    text-align: center;
}

/* Title */
h2 {
    color: var(--yellow);
    margin-bottom: 25px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px 1px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--input);
    color: white;
    font-size: 14px;
}

input:focus {
    border-color: var(--yellow);
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 13px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    background: var(--yellow);
    color: black;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffd633;
}

/* Link */
.link {
    margin-top: 20px;
    font-size: 13px;
}

.link a {
    color: var(--yellow);
    text-decoration: none;
}

/* Flash message */
.flash {
    background: #2a2a2a;
    color: var(--yellow);
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <!-- Flash -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/signup">Sign Up</a>
    </div>
</div>

</body>
</html>
