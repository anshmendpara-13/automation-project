<!DOCTYPE html>
<html>
<head>
<title>Login - Lavanya Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0f0f0f;
    --card: #1c1c1c;
    --input: #2a2a2a;
    --border: #333;
    --yellow: #ffcc00;
}

body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}

/* -------------------------
   BIGGER LOGIN BOX (UPDATED)
----------------------------*/
.card {
    background: var(--card);
    padding: 55px 45px;
    border-radius: 22px;
    width: 100%;
    max-width: 520px;   /* Bigger width */
    min-height: 520px;  /* Bigger height */
    box-shadow: 0 0 35px rgba(255,204,0,0.18);
    text-align: center;
}

/* Title */
h2 {
    color: var(--yellow);
    font-size: 32px;
    margin-bottom: 40px;
}

/* Inputs */
input {
    width: 100%;
    padding: 18px 0px;
    margin-bottom: 22px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--input);
    color: white;
    font-size: 18px;
}

input:focus {
    border-color: var(--yellow);
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 18px;
    border-radius: 10px;
    border: none;
    background: var(--yellow);
    color: black;
    font-weight: 600;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffd633;
}

/* Link */
.link {
    margin-top: 28px;
    font-size: 16px;
    color: white;
}

.link a {
    color: var(--yellow);
    text-decoration: none;
    
}

/* Flash */
.flash {
    background: #2a2a2a;
    color: var(--yellow);
    padding: 14px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 17px;
}

/* -------------------------
   MOBILE RESPONSIVE IMPROVED
----------------------------*/
@media (max-width: 480px) {

    .card {
        padding: 45px 30px;
        border-radius: 20px;
        min-height: 480px;
    }

    h2 {
        font-size: 30px;
    }

    input {
        font-size: 17px;
        padding: 16px 12px;
    }

    button {
        padding: 17px;
        font-size: 18px;
    }

    .flash {
        font-size: 16px;
    }

    .link {
        font-size: 16px;
        color: white;
    }
}

/* Removed old scaling block – it was shrinking UI */
</style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <!-- Flash -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/signup">Sign Up</a>
    </div>
</div>

</body>
</html>
