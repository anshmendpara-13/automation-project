<!DOCTYPE html>
<html>
<head>
<title>Sign Up - Lavanya Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0f0f0f;
    --card: #1c1c1c;
    --input: #2a2a2a;
    --border: #333;
    --yellow: #ffcc00;
}

body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}

/* Card */
.card {
    background: var(--card);
    padding: 40px 35px;
    border-radius: 18px;
    width: 100%;
    max-width: 420px; /* Larger on mobile */
    box-shadow: 0 0 25px rgba(255,204,0,0.15);
    text-align: center;
}

/* Title */
h2 {
    color: var(--yellow);
    font-size: 28px;
    margin-bottom: 30px;
}

/* Inputs */
input {
    width: 100%;
    padding: 14px 10px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--input);
    color: white;
    font-size: 16px;  /* Bigger text */
}

input:focus {
    border-color: var(--yellow);
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: var(--yellow);
    color: black;
    font-weight: 600;
    font-size: 17px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffd633;
}

/* Link */
.link {
    margin-top: 25px;
    font-size: 15px;
}

.link a {
    color: var(--yellow);
    text-decoration: none;
}

/* Flash */
.flash {
    background: #2a2a2a;
    color: var(--yellow);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 14px;
}

/* -------------------------
   📱 MOBILE RESPONSIVE FIXES
   ------------------------- */
@media (max-width: 480px) {

    .card {
        padding: 45px 25px;
        border-radius: 20px;
    }

    h2 {
        font-size: 30px;
    }

    input {
        font-size: 17px;
        padding: 16px 12px;
    }

    button {
        padding: 17px;
        font-size: 18px;
    }

    .link {
        font-size: 16px;
    }
}
/* ----- MOBILE 1.5X SCALING ----- */
@media (max-width: 600px) {

    body {
        padding: 0;
    }

    .card {
        transform: scale(1.5);
        transform-origin: top center;
        margin-top: 80px;  /* adjust so card is not cut */
    }

    h2 {
        font-size: 30px;
        margin-bottom: 35px;
    }

    input {
        padding: 18px 14px;
        font-size: 18px;
    }

    button {
        padding: 20px;
        font-size: 19px;
    }

    .flash {
        font-size: 17px;
        padding: 14px;
    }

    .link {
        font-size: 17px;
        margin-top: 30px;
    }
}
</style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <!-- Flash -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Sign Up</button>
    </form>

    <div class="link">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>

</body>
</html>
