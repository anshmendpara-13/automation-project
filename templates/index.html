<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavanya Tool - Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Card */
.card {
    background: #1c1c1c;
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 520px;
    box-shadow: 0 0 25px rgba(255, 204, 0, 0.15);
    border: 1px solid #2a2a2a;
}

/* Header */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.user {
    color: #ffcc00;
    font-size: 14px;
}

.logout-btn {
    background: #ff4d4d;
    color: white;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

.logout-btn:hover {
    background: #ff1a1a;
}

h2 {
    text-align: center;
    color: #ffcc00;
    margin-bottom: 20px;
}

/* Flash messages */
.flash {
    background: #2a2a2a;
    color: #ffcc00;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    font-size: 13px;
}

/* Inputs */
label {
    color: #aaa;
    font-size: 13px;
}

input, select {
    width: 100%;
    padding: 12px 0px;
    margin: 8px 0 15px 0;
    border-radius: 8px;
    border: 1px solid #333;
    background: #2a2a2a;
    color: #fff;
    transition: 0.3s;
}

input[type="file"] {
    cursor: pointer;
}

input:focus, select:focus {
    border-color: #ffcc00;
    box-shadow: 0 0 5px rgba(255,204,0,0.5);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #ffcc00;
    color: #000;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button.loading {
    background: #999;
    cursor: not-allowed;
}

button:hover {
    background: #ffd633;
    transform: scale(1.03);
}

/* White small text */
.small-link {
    color: #ffffff;
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
}

@media(max-width: 500px){
    .card {
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="card">

    <!-- 🔥 TOP BAR -->
    <div class="top-bar">
        <div class="user">👤 {{ user }}</div>
        <a href="/logout"><button class="logout-btn">Logout</button></a>
    </div>

    <h2><b>Generate Report</b></h2>

    <!-- 🔥 FLASH MESSAGES -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" enctype="multipart/form-data">

        <label>Select Account:</label>
        <select name="account_select">
            <option value="">-- Select Existing Account --</option>
            {% for acc in accounts %}
                <option value="{{ acc }}">{{ acc }}</option>
            {% endfor %}
        </select>

        <label>Or Create New Account:</label>
        <input type="text" name="new_account" placeholder="Enter new account name">

        <label>Manifest PDF:</label>
        <input type="file" name="manifest" required>

        <label>Training Excel: (Optional)</label>
        <input type="file" name="train">

        <button id="processBtn" type="submit">Generate PDF</button>

    </form>

    <div class="small-link">Already have an account?</div>

</div>

<script>
    document.querySelector("form").addEventListener("submit", function (e) {
    const btn = document.getElementById("processBtn");
    btn.innerText = "Processing...";
    btn.disabled = true;
    btn.style.opacity = "0.6";

    // ⏳ Auto-restore button + reload page after download starts
    setTimeout(() => {
        btn.innerText = "Done ✓";
        btn.disabled = false;
        btn.style.opacity = "1";

        // 🔄 Reload page after a small delay
        setTimeout(() => {
            window.location.reload();
        }, 1200);

    }, 2000);  // delay 2 seconds while PDF download starts
});
</script>

</body>
</html>
